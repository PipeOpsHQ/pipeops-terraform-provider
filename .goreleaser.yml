version: 2

before:
  hooks:
    - go mod tidy
    - go generate ./...

builds:
  - env:
      - CGO_ENABLED=0
    mod_timestamp: '{{ .CommitTimestamp }}'
    flags:
      - -trimpath
    ldflags:
      - '-s -w -X main.version={{.Version}}'
    goos:
      - freebsd
      - windows
      - linux
      - darwin
    goarch:
      - amd64
      - '386'
      - arm
      - arm64
    ignore:
      - goos: darwin
        goarch: '386'
      - goos: linux
        goarch: '386'
    binary: '{{ .ProjectName }}_v{{ .Version }}'

archives:
  - format: zip
    name_template: '{{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}'
    files:
      - LICENSE
      - README.md

checksum:
  name_template: '{{ .ProjectName }}_{{ .Version }}_SHA256SUMS'
  algorithm: sha256

signs:
  - artifacts: checksum
    args:
      - "--batch"
      - "--local-user"
      - "{{ .Env.GPG_FINGERPRINT }}"
      - "--output"
      - "${signature}"
      - "--detach-sign"
      - "${artifact}"

release:
  draft: false
  prerelease: auto
  mode: replace
  name_template: "v{{ .Version }}"
  header: |
    ## PipeOps Terraform Provider {{ .Version }}
    
    ### Installation
    
    #### From Terraform Registry (Recommended)
    ```hcl
    terraform {
      required_providers {
        pipeops = {
          source  = "PipeOpsHQ/pipeops"
          version = "~> {{ .Version }}"
        }
      }
    }
    ```
    
    #### Manual Installation
    Download the appropriate package for your OS and architecture below.
    
  footer: |
    ## What's Changed
    
    **Full Changelog**: https://github.com/PipeOpsHQ/terraform-provider-pipeops/compare/{{ .PreviousTag }}...{{ .Tag }}
    
    ## Documentation
    
    - [Provider Documentation](https://registry.terraform.io/providers/PipeOpsHQ/pipeops/latest/docs)
    - [Getting Started Guide](https://github.com/PipeOpsHQ/terraform-provider-pipeops/blob/main/GETTING_STARTED.md)
    - [Examples](https://github.com/PipeOpsHQ/terraform-provider-pipeops/tree/main/examples)

changelog:
  sort: asc
  use: github
  filters:
    exclude:
      - '^docs:'
      - '^test:'
      - '^chore:'
      - '^ci:'
      - 'merge conflict'
      - Merge pull request
      - Merge remote-tracking branch
      - Merge branch
  groups:
    - title: '🚀 New Features'
      regexp: "^.*feat[(\\w)]*:+.*$"
      order: 0
    - title: '🐛 Bug Fixes'
      regexp: "^.*fix[(\\w)]*:+.*$"
      order: 1
    - title: '📚 Documentation'
      regexp: "^.*docs[(\\w)]*:+.*$"
      order: 2
    - title: '🔧 Improvements'
      regexp: "^.*refactor[(\\w)]*:+.*$"
      order: 3
    - title: '⚡ Performance'
      regexp: "^.*perf[(\\w)]*:+.*$"
      order: 4
    - title: 'Other Changes'
      order: 999

# Terraform Registry specific configuration
metadata:
  mod_timestamp: '{{ .CommitTimestamp }}'
